name: Bedplan
options:
  bundleIdPrefix: com.shimondeitel.bedplan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Bedplan:
    type: application
    platform: iOS
    sources:
      - path: Bedplan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bedplan
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Bedplan/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BedplanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BedplanTests
    dependencies:
      - target: Bedplan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bedplan.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BedplanUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BedplanUITests
    dependencies:
      - target: Bedplan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bedplan.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Bedplan:
    build:
      targets:
        Bedplan: all
        BedplanTests: [test]
        BedplanUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Bedplan.storekit
    test:
      config: Debug
      storeKitConfiguration: Bedplan.storekit
      targets:
        - BedplanTests
        - BedplanUITests
    archive:
      config: Release
